<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <img src="./imagens/images/logo.svg" alt="Logo do Splitter">
    </header>
    
     <main>
        <section class="informacoes">
            <form action="">
                <div class="conta">
                    <label for="conta">conta</label>
                    <div>
                        <img src="./imagens/images/icon-dollar.svg" alt="icone do cifrao">
                        <input type="number" name="conta" id="conta" placeholder="0">
                    </div>
                </div>

               
                <div class="gorjeta">
                    <label for="outra">Selecione a gorjeta %</label>
                    
                    <div>
                        <input type="button" value="5%">
                        <input type="button" value="10%">
                        <input type="button" value="15%">
                        <input type="button" value="25%">
                        <input type="button" value="50%">
                        <input type="number" name="outra" id="outra" placeholder="Outra">
                    </div>
                </div>

                
                <div class="pessoas">
                     <label for="pessoa">Quantidade de pessoas</label>
                     <p>Nao pode ser zero</p>
                    
                     <div>
                        <img src="./imagens/images/icon-person.svg" alt="icone da pessoa">
                        <input type="number" name="pessoas" id="pessoas" placeholder="0">
                    </div>
                </div>

            </form>
        </section>

        <section class="resultados">
            <div class="gorjeta-total">
                <p>
                    <strong>Gorjeta</strong>
                    / pessoa
                </p>

                <strong>$ 0.00</strong>
            </div>
            
               <div class="total">
                <p>
                    <strong>Gorjeta</strong>
                    / pessoa
                </p>

                <strong>$ 0.00</strong>
            </div>

        </section>
     </main>
</body>
</html>
